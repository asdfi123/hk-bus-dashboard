<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">
<title>旺角 巴士到站</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;padding:10px}
h2{font-size:1rem;color:#888;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid #1a1a1a}

.weather-row{display:flex;gap:8px;margin-bottom:4px}
.weather-row>div{flex:1;background:#0c0c0c;border-radius:8px;padding:8px;text-align:center;border:1px solid #1a1a1a}
.weather-row .date{font-size:.7rem;color:#aaa}
.weather-row img{width:32px;height:32px;margin:4px 0}
.weather-row .temp{font-size:.85rem;font-weight:bold}
.weather-row .psr{font-size:.7rem;color:#888}

.mtr-card{background:#0c0c0c;border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid #0071CE}
.mtr-card.ktl{border-left-color:#A3238E}
.mtr-card .line{font-size:.75rem;color:#888;margin-bottom:4px}
.mtr-card .dir{display:flex;justify-content:space-between;padding:4px 0;font-size:.9rem}
.mtr-card .eta{font-weight:bold;font-variant-numeric:tabular-nums}
.mtr-card .eta.soon{color:#ff3b30}

.bus-card{display:flex;align-items:center;background:#140202;border:1px solid #991414;border-radius:8px;padding:10px;margin-bottom:6px}
.bus-card .no{font-size:2rem;font-weight:900;color:#ff5252;min-width:45px;text-align:center}
.bus-card .info{flex:1;margin-left:10px;min-width:0}
.bus-card .dest{font-size:.9rem;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bus-card .etas{font-size:1rem;color:#ff5252;margin-top:2px}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header .clock{font-size:2.5rem;font-weight:700;font-variant-numeric:tabular-nums}
.header .date{font-size:.85rem;color:#aaa;line-height:1.4}
.header .temp{font-size:1.5rem;font-weight:700;color:#4da6ff}
.loading{color:#ff0!important}
.no-data{text-align:center;color:#555;padding:20px}
.warn-active{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.4);border-radius:8px;padding:8px;font-size:.8rem;margin:6px 0;text-align:center}
</style>
</head>
<body>

<div class="header">
<div>
<div class="clock" id="clock">--:--</div>
<div class="date" id="date-display">--</div>
</div>
<div class="temp" id="now-temp">--°C</div>
</div>

<div class="weather-row" id="weather-cards"></div>
<div id="warn-box"></div>

<h2>🚆 旺角站</h2>
<div id="mtr-area"></div>

<h2>🚌 旺角奶路臣街 往尖沙咀 <span class="refresh" id="bus-status">🔄</span></h2>
<div id="bus-area"><div class="no-data">讀取中...</div></div>

<script>
const ROUTES=['1','1A','2','6'];
const KMB_STOP='6AB438AD3AE100DD';
const MTR_DEST={'TSW':'荃灣','CEN':'中環','TIK':'調景嶺','WHA':'黃埔'};

async function fetchWeather(){
  try{
    const r=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
    const d=await r.json();
    // current temp
    const tst=d.temperature.data.find(x=>x.place==='香港天文台');
    if(tst) document.getElementById('now-temp').innerText=tst.value+'°C';

    // forecast
    const f=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
    const fd=await f.json();
    const now=new Date();
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Hong_Kong',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(now);
    const today=parts.find(p=>p.type==='year').value+parts.find(p=>p.type==='month').value+parts.find(p=>p.type==='day').value;
    const ff=fd.weatherForecast.filter(fc=>fc.forecastDate!==today).slice(0,3);
    ff.forEach(fc=>{
      const dt=fc.forecastDate.substring(4,6)+'/'+fc.forecastDate.substring(6,8)+' '+fc.week;
      h+=`<div><div class="date">${dt}</div><img src="https://www.hko.gov.hk/images/HKOWxIconOutline/pic${fc.ForecastIcon}.png"><div class="temp">${fc.forecastMintemp.value}°-${fc.forecastMaxtemp.value}°</div><div class="psr">${fc.PSR}</div></div>`;
    });
    document.getElementById('weather-cards').innerHTML=h;

    // warnings
    const wr=await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
    const wd=await wr.json();
    let wh='';
    for(const k in wd){
      if(wd[k].actionCode==='ISSUE'||wd[k].actionCode==='REISSUE') wh+=wd[k].name+' ';
    }
    const wb=document.getElementById('warn-box');
    if(wh) wb.innerHTML=`<div class="warn-active">⚠️ ${wh}</div>`;
    else wb.innerHTML='';
  }catch(e){}
}

async function fetchMTR(){
  try{
    const[twl,ktl]=await Promise.all([
      fetch('https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TWL&sta=MOK').then(r=>r.json()),
      fetch('https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=KTL&sta=MOK').then(r=>r.json())
    ]);
    let h='';
    [{d:twl,key:'TWL-MOK',line:'荃灣綫',cls:''},{d:ktl,key:'KTL-MOK',line:'觀塘綫',cls:'ktl'}].forEach(l=>{
      let items=[];
      if(l.d?.data?.[l.key]){
        ['UP','DOWN'].forEach(dir=>{
          const arr=l.d.data[l.key][dir];
          if(arr?.length>0){
            const dest=MTR_DEST[arr[0].dest]||arr[0].dest;
            const t=new Date(arr[0].time.replace(' ','T')+'+08:00');
            const diff=Math.floor((t-new Date())/1000);
            let eta=diff<=0?'正在開出':diff<=60?'即將到達':`${Math.floor(diff/60)}分${(diff%60).toString().padStart(2,'0')}秒`;
            items.push({dest,eta,soon:diff<=60});
          }
        });
      }
      h+=`<div class="mtr-card ${l.cls}"><div class="line">${l.line}</div>`;
      items.forEach(i=>h+=`<div class="dir"><span>往 ${i.dest}</span><span class="eta${i.soon?' soon':''}">${i.eta}</span></div>`);
      h+='</div>';
    });
    document.getElementById('mtr-area').innerHTML=h||'<div class="no-data">暫無數據</div>';
  }catch(e){document.getElementById('mtr-area').innerHTML='<div class="no-data">讀取失敗</div>';}
}

async function fetchBus(){
  document.getElementById('bus-status').innerText='🔄';
  try{
    const r=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${KMB_STOP}`);
    const d=await r.json();
    const now=new Date();
    let groups={};
    if(d?.data) d.data.forEach(x=>{
      if(x.eta&&new Date(x.eta)>now&&ROUTES.includes(x.route)){
        if(!groups[x.route]) groups[x.route]={dest:x.dest_tc,etas:[]};
        groups[x.route].etas.push(x.eta);
      }
    });
    Object.values(groups).forEach(g=>g.etas.sort());
    let h='';
    Object.entries(groups).forEach(([no,g])=>{
      const etas=g.etas.map(e=>{
        const diff=Math.floor((new Date(e)-new Date())/1000);
        return diff<=0?'開出':diff<=60?'即將':`${Math.floor(diff/60)}'${(diff%60).toString().padStart(2,'0')}\"`;
      }).join(' · ');
      h+=`<div class="bus-card"><div class="no">${no}</div><div class="info"><div class="dest">${g.dest}</div><div class="etas">${etas}</div></div></div>`;
    });
    document.getElementById('bus-area').innerHTML=h||'<div class="no-data">暫無班次</div>';
    document.getElementById('bus-status').innerText='🟢';
  }catch(e){document.getElementById('bus-status').innerText='❌';}
}

function tick(){
  const now=new Date();
  const days=['禮拜日','禮拜一','禮拜二','禮拜三','禮拜四','禮拜五','禮拜六'];
  document.getElementById('clock').innerText=now.toLocaleTimeString('en-US',{timeZone:'Asia/Hong_Kong',hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date-display').innerText=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
}
tick();setInterval(tick,1000);

fetchWeather();fetchMTR();fetchBus();
setInterval(fetchMTR,15000);setInterval(fetchBus,30000);setInterval(fetchWeather,600000);
</script>
</body>
</html>
