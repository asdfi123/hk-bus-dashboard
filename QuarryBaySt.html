<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>旺角奶路臣街 巴士到站時間</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #0c0c0c;
            --panel-border: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #666666;
            --warning-red: #ff4d4d;
            --normal-bg: rgba(255, 255, 255, 0.02);
            
            --kmb-bg: #140202;
            --kmb-border: #991414;
            --ctb-bg: #141100;
            --ctb-border: #a38200;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* --- 左側佈局 --- */
        .left-col { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        
        .datetime-section { flex: 0 0 auto; }
        .date-container { margin-bottom: 15px; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px; }
        .date-display { font-size: 1.3rem; font-weight: 600; color: #fff; }
        .holiday-badge { font-size: 0.9rem; font-weight: 600; color: var(--warning-red); background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 8px; letter-spacing: 0.5px; }
        
        .time-container { display: flex; flex-direction: column; gap: 2px; }
        .location-label { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
        
        /* 時間並排佈局 (HKT + UTC) */
        .time-row { display: flex; align-items: baseline; gap: 12px; }
        .time-display { font-size: 3.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
        .utc-display { font-size: 1.25rem; font-weight: 500; color: #888; font-variant-numeric: tabular-nums; }

        .weather-section { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* 天氣頂部圖表 */
        .weather-display-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 15px 0 5px 0;
            background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border-radius: 12px 12px 0 0;
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: none;
        }
        .weather-status-icon {
            height: 90px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .weather-current-stats {
            display: flex;
            flex-direction: column;
            border-left: 2px solid rgba(255,255,255,0.1);
            padding-left: 25px;
        }
        .current-temp {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: -1px;
        }
        .current-hum {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
        }
        .current-hum span {
            color: #4da6ff;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        /* 1x4 同行天氣網格 */
        .weather-grid-inline { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 10px;
        }
        .w-item { text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .w-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; white-space: nowrap;}
        .w-val { font-size: 1rem; font-weight: 700; color: #ddd; }

        @keyframes alertBlink {
            0% { opacity: 0.4; box-shadow: 0 0 4px rgba(255, 77, 77, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 15px rgba(255, 77, 77, 0.6); background: rgba(255, 77, 77, 0.15); }
            100% { opacity: 0.4; box-shadow: 0 0 4px rgba(255, 77, 77, 0.2); }
        }

        @keyframes swtBlink {
            0% { opacity: 0.5; box-shadow: 0 0 4px rgba(255, 215, 0, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); background: rgba(255, 215, 0, 0.15); }
            100% { opacity: 0.5; box-shadow: 0 0 4px rgba(255, 215, 0, 0.2); }
        }

        .alert-box { border-radius: 10px; padding: 12px 15px; font-size: 0.95rem; font-weight: 600; text-align: left; display: flex; flex-direction: column; gap: 8px; }
        .alert-active { background: rgba(255, 77, 77, 0.08); border: 1px solid rgba(255, 77, 77, 0.4); animation: alertBlink 2s infinite ease-in-out; }
        .alert-none { background: var(--normal-bg); border: 1px solid var(--panel-border); color: var(--text-muted); font-weight: normal; animation: none; text-align: center; }
        .swt-box { border-radius: 10px; padding: 10px 12px; font-size: 0.85rem; font-weight: 600; line-height: 1.4; text-align: left; background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.4); color: #ffd700; animation: swtBlink 2s infinite ease-in-out; }

        /* 3日天氣預報 */
        .forecast-container { display: flex; gap: 8px; margin-top: auto; }
        .forecast-item { 
            flex: 1; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 10px; 
            padding: 10px 5px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .fc-date { font-size: 0.8rem; color: #ccc; font-weight: bold; }
        .fc-icon { width: 35px; height: 35px; }
        .fc-temp { font-size: 0.9rem; font-weight: 700; color: #fff; letter-spacing: -0.5px;}
        .fc-psr { font-size: 0.75rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3);}
        .psr-high { color: #ff4d4d; }
        .psr-mid { color: #ffcc00; }
        .psr-low { color: #4da6ff; }

        /* --- 右側佈局 --- */
        .right-col { display: flex; flex-direction: column; gap: 20px; height: 100%; overflow: hidden; }
        
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--text-muted); border-bottom: 1px solid var(--panel-border); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .refresh-indicator { font-size: 0.75rem; color: #00ff66; font-weight: normal; }
        .refresh-indicator.loading { color: #ffcc00; }

        /* 港鐵 */
        .mtr-section { flex: 0 0 auto; }
        .mtr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .station-card { border-radius: 12px; padding: 15px; }
        .qub-isl-style { background: #001f11; border: 1px solid #006432; box-shadow: inset 0 0 5px rgba(0, 100, 50, 0.3); }
        .qub-tkl-style { background: #1f0b2a; border: 1px solid #7935ab; box-shadow: inset 0 0 5px rgba(121, 53, 171, 0.3); }
        .tak-isl-style { background: #1f0507; border: 1px solid #b6121a; box-shadow: inset 0 0 5px rgba(182, 18, 26, 0.3); }
        
        .station-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .line-badge { font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; font-weight: bold; letter-spacing: 0.5px; }
        .badge-isl { background: #0071CE; color: #fff; } 
        .badge-tkl { background: #A3238E; color: #fff; } 

        .mtr-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.95rem; overflow: hidden; }
        .mtr-item:last-child { border-bottom: none; }
        .mtr-dest { white-space: nowrap; flex: 0 0 85px; }
        .mtr-eta-container { flex: 1; text-align: right; overflow: hidden; display: flex; justify-content: flex-end; }
        .mtr-eta { font-weight: bold; font-variant-numeric: tabular-nums; white-space: nowrap; }
        .mtr-marquee { width: 100%; color: var(--warning-red); font-size: 0.85rem; font-weight: bold; }

        /* 巴士 */
        .bus-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .bus-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 4px; overflow-y: auto; align-content: flex-start; padding-right: 5px; }
        .bus-grid::-webkit-scrollbar { width: 4px; }
        .bus-grid::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

        .bus-card { aspect-ratio: 1 / 1; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; }
        .bus-card.kmb { background: var(--kmb-bg); border: 1px solid var(--kmb-border); }
        .bus-card.ctb { background: var(--ctb-bg); border: 1px solid var(--ctb-border); }
        
        .bus-no { font-size: 1.5rem; font-weight: 900; line-height: 1; }
        .bus-dest { font-size: 0.75rem; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
        .bus-eta { font-size: 0.95rem; font-weight: bold; text-align: right; font-variant-numeric: tabular-nums; width: 100%; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 4px; }
        .bus-card.kmb .bus-eta { color: #ff5252; }
        .bus-card.ctb .bus-eta { color: #ffcc00; }

        @keyframes textBlink { 0% { opacity: 0.4; color: #ff3b30; } 50% { opacity: 1; color: #ff3b30; } 100% { opacity: 0.4; color: #ff3b30; } }
        @keyframes kmbPulse { 0% { background-color: #140202; border-color: #991414; } 50% { background-color: #3b0a0a; border-color: #ff3333; box-shadow: 0 0 8px rgba(255, 51, 51, 0.4); } 100% { background-color: #140202; border-color: #991414; } }
        @keyframes ctbPulse { 0% { background-color: #141100; border-color: #a38200; } 50% { background-color: #382d00; border-color: #ffcc00; box-shadow: 0 0 8px rgba(255, 204, 0, 0.4); } 100% { background-color: #141100; border-color: #a38200; } }
        
        .arriving-pulse.kmb { animation: kmbPulse 1.6s infinite ease-in-out; }
        .arriving-pulse.ctb { animation: ctbPulse 1.6s infinite ease-in-out; }
        .arriving-text { color: #ff3b30 !important; animation: textBlink 1.2s infinite ease-in-out; font-weight: 900; }
        .no-service { grid-column: 1 / -1; text-align: center; color: #555; padding: 40px; font-size: 0.95rem; line-height: 1.6;}

        /* --- 交通事故跑馬燈 (置底) --- */
        .traffic-news-bar {
            flex: 0 0 auto;
            background: rgba(255, 77, 77, 0.15);
            border-top: 1px solid #ff4d4d;
            color: #ffcc00;
            padding: 8px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            display: none;
            align-items: center;
        }

        /* --- 響應式設計 --- */
        @media screen and (max-width: 768px) {
            body { height: 100vh; }
            .main-content { grid-template-columns: 1fr; overflow-y: auto; padding: 10px; gap: 15px; }
            .left-col, .right-col { height: auto; overflow: visible; gap: 15px; }
            .panel { margin-bottom: 0; padding: 15px; }
            .bus-section { min-height: 400px; }
            .bus-grid { overflow-y: visible; }
            .weather-section { min-height: 350px; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="left-col">
            <div class="panel datetime-section">
                <div class="date-container">
                    <div class="date-display" id="current-date">📅 --年--月--日</div>
                    <div class="holiday-badge" id="holiday-badge" style="display: none;"></div>
                </div>
                <div class="time-container">
                    <div class="location-label">Mong Kok 旺角</div>
                    <div class="time-row">
                        <div class="time-display" id="hk-time">--:--</div>
                        <div class="utc-display" id="utc-time">--:-- UTC</div>
                    </div>
                </div>
            </div>

            <div class="panel weather-section">
                <h2 style="border:none; margin:0 0 5px 0; padding:0; color:#fff; font-size:1.1rem;">香港即時天氣</h2>
                
                <div>
                    <!-- 主天氣顯示 -->
                    <div class="weather-display-main">
                        <img class="weather-status-icon" id="weather-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Weather Icon">
                        <div class="weather-current-stats">
                            <div class="current-temp" id="hk-temp">--°C</div>
                            <div class="current-hum">相對濕度 <span id="hk-hum">--%</span></div>
                        </div>
                    </div>
                    
                    <!-- 1x4 數據網格 -->
                    <div class="weather-grid-inline">
                        <div class="w-item"><div class="w-label">UV指數</div><div class="w-val" id="hk-uv">--</div></div>
                        <div class="w-item"><div class="w-label">降雨概率</div><div class="w-val" id="hk-psr">--</div></div>
                        <div class="w-item"><div class="w-label">今日最高</div><div class="w-val" id="hk-max">--°C</div></div>
                        <div class="w-item"><div class="w-label">今日最低</div><div class="w-val" id="hk-min">--°C</div></div>
                    </div>
                </div>
                
                <div id="warning-box" class="alert-box alert-none">🟢 現時沒有天氣警告信號</div>
                <div id="swt-box" class="swt-box" style="display: none;"></div>

                <!-- 3日天氣預報 -->
                <div id="forecast-container" class="forecast-container">
                    <!-- 預測資料將由 JS 填入 -->
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="panel mtr-section">
                <h2>🚆 地鐵即時班次</h2>
                <div class="mtr-grid">
                    <div class="station-card qub-isl-style">
                        <div class="station-name">旺角 <span class="line-badge badge-isl">荃灣綫 TWL</span></div>
                        <div id="mtr-qub-isl-data"></div>
                    </div>
                    <div class="station-card qub-tkl-style">
                        <div class="station-name">旺角 <span class="line-badge badge-tkl">觀塘綫 KTL</span></div>
                        <div id="mtr-qub-tkl-data"></div>
                    </div>
                    <div class="station-card tak-isl-style">
                        <div class="station-name">油麻地 <span class="line-badge badge-isl">荃灣綫 TWL</span></div>
                        <div id="mtr-tak-isl-data"></div>
                    </div>
                </div>
            </div>

            <div class="panel bus-section">
                <h2>
                    <span>🚌 旺角奶路臣街 往尖沙咀碼頭</span>
                    <span class="refresh-indicator" id="refresh-status">🔄 系統啟動中...</span>
                </h2>
                <div class="bus-grid" id="bus-data"></div>
            </div>
        </div>
    </div>

    <div id="traffic-news-bar" class="traffic-news-bar">
        <marquee id="traffic-marquee" scrollamount="6"></marquee>
    </div>

    <script>
        let transportTimestamps = { mtr_qub_isl: [], mtr_qub_tkl: [], mtr_tak_isl: [], bus: [] };
        let hkHolidaysMap = {}; 
        
        const ALLOWED_ROUTES = ['1', '1A', '2', '6'];
        const CTB_API_BASE = 'https://rt.data.gov.hk/v1/transport/citybus-nwfb';
        
        let ctbTargetStops = [];
        const KMB_TARGET_STOP = '6AB438AD3AE100DD';

        const MTR_DEST_MAP = {
            'KET': '堅尼地城', 'CHW': '柴灣', 'POA': '寶琳', 'LHP': '康城',
            'NOP': '北角', 'ADM': '金鐘', 'WHA': '黃埔', 'TIH': '太古'
        };

        const WEATHER_EMOJI_MAP = {
            'TC1': '಄1️⃣ 一號戒備信號',
            'TC3': '಄3️⃣ 三號強風信號',
            'TC8NE': '಄8️⃣↗️ 八號東北烈風或暴風信號',
            'TC8NW': '಄8️⃣↖️ 八號西北烈風或暴風信號',
            'TC8SE': '಄8️⃣↘️ 八號東南烈風或暴風信號',
            'TC8SW': '಄8️⃣↙️ 八號西南烈風或暴風信號',
            'TC9': '಄9️⃣ 九號烈風或暴風風力增強信號',
            'TC10': '಄🔟⚠️ 十號颶風信號',
            'WRAINY': '🟨🌧️ 黃色暴雨警告',
            'WRAINR': '🟥🌧️ 紅色暴雨警告',
            'WRAINB': '⬛🌧️ 黑色暴雨警告',
            'WTS': '⛈️ 雷暴警告',
            'WCOLD': '🥶 寒冷天氣警告',
            'WHOT': '🥵 酷熱天氣警告',
            'WFIREY': '🟨🔥 黃色火災危險警告',
            'WFIRER': '🟥🔥 紅色火災危險警告',
            'WMSGNL': '🌬️ 強烈季候風信號',
            'WFNW': '🌊 新界北部水浸特別報告',
            'WL': '⛰️⚠️ 山泥傾瀉警告',
            'WFROST': '❄️ 霜凍警告'
        };

        async function fetchHolidays() {
            try {
                const res = await fetch('https://www.1823.gov.hk/common/ical/gc/tc.json');
                const data = await res.json();
                if (data && data.vcalendar && data.vcalendar[0] && data.vcalendar[0].vevent) {
                    data.vcalendar[0].vevent.forEach(event => {
                        if (event.dtstart && event.dtstart[0]) {
                            hkHolidaysMap[event.dtstart[0]] = event.summary;
                        }
                    });
                }
            } catch (e) {}
        }

        function updateTick() {
            const now = new Date();
            const daysOfWeek = ['禮拜日', '禮拜一', '禮拜二', '禮拜三', '禮拜四', '禮拜五', '禮拜六'];
            
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            
            document.getElementById('current-date').innerText = `📅 ${yyyy}年${now.getMonth() + 1}月${now.getDate()}日 ${daysOfWeek[now.getDay()]}`;
            document.getElementById('hk-time').innerText = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Hong_Kong', hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('utc-time').innerText = now.toLocaleTimeString('en-US', { timeZone: 'UTC', hour12: false, hour: '2-digit', minute: '2-digit' }) + ' UTC';
            
            const dateKey = `${yyyy}${mm}${dd}`;
            const holidayBadge = document.getElementById('holiday-badge');
            if (hkHolidaysMap[dateKey]) {
                holidayBadge.innerText = `🎈 ${hkHolidaysMap[dateKey]}`;
                holidayBadge.style.display = 'inline-block';
            } else {
                holidayBadge.style.display = 'none';
            }
            
            renderUI();
        }

        function parseRemaining(targetDateStr) {
            if (!targetDateStr) return { text: "今日的列車服務經已終止", isArriving: false, isEnd: true };
            const diffSec = Math.floor((new Date(targetDateStr) - new Date()) / 1000);
            if (diffSec <= 0) return { text: "正在開出", isArriving: true, isEnd: false };
            if (diffSec <= 60) return { text: "即將到達", isArriving: true, isEnd: false };
            const m = Math.floor(diffSec / 60);
            const s = diffSec % 60;
            return { text: `${m}分${s.toString().padStart(2, '0')}秒`, isArriving: false, isEnd: false };
        }

        function renderUI() {
            ['mtr_qub_isl', 'mtr_qub_tkl', 'mtr_tak_isl'].forEach(id => {
                let html = '';
                transportTimestamps[id].forEach(t => {
                    const etaInfo = parseRemaining(t.time);
                    let etaDisplayHtml = etaInfo.isEnd ? 
                        `<marquee class="mtr-marquee" scrollamount="4">今日的列車服務經已終止</marquee>` : 
                        `<span class="mtr-eta ${etaInfo.isArriving ? 'arriving-text' : ''}">${etaInfo.text}</span>`;
                    
                    html += `<div class="mtr-item"><div class="mtr-dest">往 ${t.dest}</div><div class="mtr-eta-container">${etaDisplayHtml}</div></div>`;
                });
                const targetDiv = document.getElementById(id.replace(/_/g, '-') + '-data');
                if (targetDiv) targetDiv.innerHTML = html;
            });

            let busHtml = '';
            if (transportTimestamps.bus.length === 0) {
                const statusText = document.getElementById('refresh-status').innerText;
                if (statusText.includes('🔄') || statusText.includes('安全')) {
                    busHtml = `<div class="no-service">⏳ 系統正擷取數據...<br><span style="font-size:0.8rem; color:#666;">預計需時幾秒，請耐心等候</span></div>`;
                } else {
                    busHtml = `<div class="no-service">💤 指定路線目前無即時班次<br><br><span style="font-size:0.8rem; color:#444;">[已連線 九巴:${KMB_TARGET_STOP}]</span></div>`;
                }
            } else {
                transportTimestamps.bus.forEach(b => {
                    const etaInfo = parseRemaining(b.time);
                    const pulseClass = etaInfo.isArriving ? `arriving-pulse ${b.co}` : '';
                    busHtml += `
                        <div class="bus-card ${b.co} ${pulseClass}">
                            <div><div class="bus-no">${b.no}</div><div class="bus-dest">${b.dest}</div></div>
                            <div class="bus-eta ${etaInfo.isArriving ? 'arriving-text' : ''}">${etaInfo.text}</div>
                        </div>`;
                });
            }
            document.getElementById('bus-data').innerHTML = busHtml;
        }

        async function discoverExactStops() { /* 全九巴路線，無需城巴 */ }

        async function fetchRealBusData() {
            document.getElementById('refresh-status').innerText = '🔄 讀取班次...';
            
            let rawBusData = [];
            const now = new Date();

            try {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${KMB_TARGET_STOP}`);
                const json = await res.json();
                if (json?.data) json.data.forEach(d => { 
                    if (d.eta && new Date(d.eta) > now && ALLOWED_ROUTES.includes(d.route)) 
                        rawBusData.push({ no: d.route, dest: d.dest_tc, time: d.eta, co: 'kmb' }); 
                });
            } catch(e) {}

            let uniqueBuses = {};
            rawBusData.forEach(b => { if (!uniqueBuses[b.no] || new Date(b.time) < new Date(uniqueBuses[b.no].time)) uniqueBuses[b.no] = b; });
            
            transportTimestamps.bus = Object.values(uniqueBuses).sort((a, b) => new Date(a.time) - new Date(b.time));
            document.getElementById('refresh-status').className = 'refresh-indicator';
            document.getElementById('refresh-status').innerText = `🟢 60秒更新 | 九巴 ${KMB_TARGET_STOP}`;
            renderUI();
        }

        async function fetchWeather() {
            try {
                // 1. 取得實時數據
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await res.json();
                
                if (data.icon && data.icon.length > 0) {
                    document.getElementById('weather-icon').src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${data.icon[0]}.png`;
                }
                const tstTemp = data.temperature.data.find(d => d.place === '香港天文台');
                document.getElementById('hk-temp').innerText = tstTemp ? `${tstTemp.value}°C` : '--°C';
                const tstHum = data.humidity.data.find(d => d.place === '香港天文台');
                document.getElementById('hk-hum').innerText = tstHum ? `${tstHum.value}%` : '--%';

                let uvHtml = '--';
                if (data.uvindex && data.uvindex.data && data.uvindex.data.length > 0) {
                    const uvVal = data.uvindex.data[0].value;
                    if (parseFloat(uvVal) >= 11) uvHtml = `<span class="arriving-text">${uvVal} 🕶️</span>`;
                    else uvHtml = uvVal;
                }
                document.getElementById('hk-uv').innerHTML = uvHtml;

                // 2. 警告與提示
                const warnRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const warnData = await warnRes.json();
                const warnBox = document.getElementById('warning-box');
                let warningHtml = '';
                for (const key in warnData) {
                    const action = warnData[key].actionCode;
                    if (action === "ISSUE" || action === "REISSUE") {
                        const warnCode = warnData[key].code;
                        const emojiDisplay = WEATHER_EMOJI_MAP[warnCode] || warnData[key].name;
                        warningHtml += `<span>${emojiDisplay}</span>`;
                    }
                }
                if (warningHtml !== '') {
                    warnBox.className = 'alert-box alert-active';
                    warnBox.innerHTML = warningHtml;
                } else {
                    warnBox.className = 'alert-box alert-none';
                    warnBox.innerHTML = '🟢 現時沒有天氣警告信號';
                }

                const swtRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc');
                const swtData = await swtRes.json();
                const swtBox = document.getElementById('swt-box');
                if (swtData?.swt?.length > 0) {
                    let swtHtml = '💡 <b>特別天氣提示：</b><br>';
                    swtData.swt.forEach(tip => { swtHtml += `<span style="display:block; margin-top:4px;">• ${tip.desc}</span>`; });
                    swtBox.innerHTML = swtHtml;
                    swtBox.style.display = 'block'; 
                } else {
                    swtBox.style.display = 'none';
                }

                // 3. 取得 9天預報 (動態比對日期過濾當日，精準只抽未來3日)
                const fndRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndData = await fndRes.json();
                
                // 獲取精確嘅香港今日日期 (格式：YYYYMMDD)
                const nowHK = new Date();
                const parts = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Hong_Kong', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(nowHK);
                const todayStr = parts.find(p => p.type === 'year').value + parts.find(p => p.type === 'month').value + parts.find(p => p.type === 'day').value;

                // 搵出今日嘅預報，寫入 1x4 數據網格
                const todayForecast = fndData.weatherForecast.find(fc => fc.forecastDate === todayStr);
                if (todayForecast) {
                    document.getElementById('hk-max').innerText = `${todayForecast.forecastMaxtemp.value}°C`;
                    document.getElementById('hk-min').innerText = `${todayForecast.forecastMintemp.value}°C`;
                    const psrVal = todayForecast.PSR;
                    if (psrVal.includes('高')) {
                        document.getElementById('hk-psr').innerHTML = `<span class="arriving-text">${psrVal} ☔</span>`;
                    } else {
                        document.getElementById('hk-psr').innerHTML = psrVal;
                    }
                } else {
                    // 萬一深夜或清晨天文台提早唔提供今日預報，用第一個做 fallback 廢事斷版面
                    const fallback = fndData.weatherForecast[0];
                    if (fallback) {
                        document.getElementById('hk-max').innerText = `${fallback.forecastMaxtemp.value}°C`;
                        document.getElementById('hk-min').innerText = `${fallback.forecastMintemp.value}°C`;
                        document.getElementById('hk-psr').innerHTML = fallback.PSR;
                    }
                }

                // 過濾走今日，只抽出緊接其後嘅「未來3日預報」
                const futureForecasts = fndData.weatherForecast.filter(fc => fc.forecastDate !== todayStr).slice(0, 3);

                let forecastHtml = '';
                futureForecasts.forEach(fc => {
                    const dateStr = fc.forecastDate.substring(4,6) + '/' + fc.forecastDate.substring(6,8); 
                    const min = fc.forecastMintemp.value;
                    const max = fc.forecastMaxtemp.value;
                    const psr = fc.PSR;
                    const icon = fc.ForecastIcon;
                    
                    let psrClass = "psr-low";
                    let psrIcon = "☀️";
                    if(psr.includes('高')) { psrClass = "psr-high"; psrIcon = "🌧️"; }
                    else if(psr.includes('中')) { psrClass = "psr-mid"; psrIcon = "☁️"; }

                    forecastHtml += `
                        <div class="forecast-item">
                            <div class="fc-date">${dateStr} ${fc.week}</div>
                            <img class="fc-icon" src="https://www.hko.gov.hk/images/HKOWxIconOutline/pic${icon}.png" alt="icon">
                            <div class="fc-temp">${min}° - ${max}°</div>
                            <div class="fc-psr ${psrClass}">${psrIcon} ${psr}</div>
                        </div>
                    `;
                });
                document.getElementById('forecast-container').innerHTML = forecastHtml;

            } catch (e) {}
        }

        function setupMtrData(data, key, defaultDestinations) {
            let trains = [];
            if (data?.data?.[key]) {
                const upData = data.data[key].UP;
                const downData = data.data[key].DOWN;
                
                if (upData?.length > 0) trains.push({ dest: MTR_DEST_MAP[upData[0].dest] || upData[0].dest, time: upData[0].time.replace(' ', 'T') + '+08:00' });
                else trains.push({ dest: defaultDestinations.up, time: null });

                if (downData?.length > 0) trains.push({ dest: MTR_DEST_MAP[downData[0].dest] || downData[0].dest, time: downData[0].time.replace(' ', 'T') + '+08:00' });
                else trains.push({ dest: defaultDestinations.down, time: null });
            } else {
                trains = [{ dest: defaultDestinations.up, time: null }, { dest: defaultDestinations.down, time: null }];
            }
            return trains;
        }

        async function fetchMTR() {
            try {
                const [resTwlM, resKtlM, resTwlY] = await Promise.all([
                    fetch(`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TWL&sta=MOK`).then(r=>r.json()),
                    fetch(`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=KTL&sta=MOK`).then(r=>r.json()),
                    fetch(`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TWL&sta=YMT`).then(r=>r.json())
                ]);
                transportTimestamps.mtr_qub_isl = setupMtrData(resTwlM, 'TWL-MOK', { up: '荃灣', down: '中環' });
                transportTimestamps.mtr_qub_tkl = setupMtrData(resKtlM, 'KTL-MOK', { up: '調景嶺', down: '黃埔' });
                transportTimestamps.mtr_tak_isl = setupMtrData(resTwlY, 'TWL-YMT', { up: '荃灣', down: '中環' });
            } catch (e) {}
        }

        async function fetchTrafficNews() {
            try {
                const rssUrl = encodeURIComponent('https://www.td.gov.hk/tc/special_news/trafficnews.xml');
                const res = await fetch(`https://api.allorigins.win/get?url=${rssUrl}`);
                const data = await res.json();
                
                if (data.contents) {
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(data.contents, "text/xml");
                    const items = xml.querySelectorAll("item");
                    
                    let newsArr = [];
                    items.forEach(item => {
                        let desc = item.querySelector("description") ? item.querySelector("description").textContent : "";
                        let title = item.querySelector("title") ? item.querySelector("title").textContent : "";
                        let cleanDesc = desc.replace(/(<([^>]+)>)/gi, "").trim();
                        let contentToUse = cleanDesc || title.replace(/(<([^>]+)>)/gi, "").trim();
                        if (contentToUse && !contentToUse.includes('現時沒有特別') && !contentToUse.includes('交通回復正常')) {
                            newsArr.push(`⚠️ ${contentToUse}`);
                        }
                    });

                    const bar = document.getElementById('traffic-news-bar');
                    const marquee = document.getElementById('traffic-marquee');
                    
                    if (newsArr.length > 0) {
                        marquee.innerText = newsArr.join('  ｜  ');
                        bar.style.display = 'flex';
                    } else {
                        bar.style.display = 'none'; 
                    }
                }
            } catch (e) {
                console.error("無法取得特別交通消息:", e);
            }
        }

        async function boot() {
            await fetchHolidays(); 
            setInterval(updateTick, 1000); 
            await discoverExactStops(); 
            
            await fetchWeather();
            await fetchMTR();
            await fetchRealBusData();
            await fetchTrafficNews(); 
                      
            setInterval(fetchMTR, 15000); 
            setInterval(fetchRealBusData, 60000); 
            setInterval(fetchWeather, 900000); 
            setInterval(fetchTrafficNews, 300000); 
            
            setInterval(() => { window.location.reload(); }, 24 * 60 * 60 * 1000); 
        }

        boot();
    </script>
